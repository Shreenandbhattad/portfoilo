<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Matrix — Visualization System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#4A9EFF;--sky:#00D4FF;--mint:#5EEAD4;
  --white:#E8F4FF;--dim:rgba(140,190,255,0.38);
  --bg:#030810;--panel:rgba(6,14,30,0.82);
  --border:rgba(74,158,255,0.14);--border2:rgba(74,158,255,0.22);
}
html,body{width:100%;height:100%;background:#030810;overflow:hidden;
  font-family:'DM Mono',monospace;color:#E8F4FF}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;cursor:crosshair}
#cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;
  z-index:0;transform:scaleX(-1);display:none;opacity:.1}
#vig{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 42%,rgba(2,6,16,.72) 100%)}
#flash{position:fixed;inset:0;pointer-events:none;z-index:3;opacity:0;transition:opacity .1s;
  background:radial-gradient(ellipse at center,rgba(74,158,255,.07) 0%,transparent 70%)}
#hud{position:fixed;inset:0;z-index:10;pointer-events:none}

/* TOP */
#topbar{position:absolute;top:0;left:0;right:0;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;border-bottom:1px solid rgba(74,158,255,0.14);
  background:linear-gradient(180deg,rgba(3,8,16,.96) 0%,rgba(3,8,16,0) 100%)}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;
  letter-spacing:4px;color:#E8F4FF;opacity:.9}
.brand em{color:#00D4FF;font-style:normal}
#sysrow{display:flex;align-items:center;gap:22px;font-size:9px;letter-spacing:2px;color:rgba(140,190,255,.38)}
.ldot{width:5px;height:5px;border-radius:50%;background:#5EEAD4;
  box-shadow:0 0 8px #5EEAD4;animation:ldota 2.6s ease-in-out infinite}
@keyframes ldota{0%,100%{opacity:1}50%{opacity:.25}}
#clk{font-size:10px;color:#00D4FF;opacity:.55}

/* LEFT */
#lpanel{position:absolute;left:20px;top:64px;bottom:64px;width:162px;
  display:flex;flex-direction:column;gap:5px;justify-content:center}
.card{background:rgba(6,14,30,0.82);border:1px solid rgba(74,158,255,.14);
  border-left:2px solid transparent;padding:10px 13px;backdrop-filter:blur(18px);
  transition:border-left-color .22s,background .22s}
.card:hover{background:rgba(74,158,255,.06);border-left-color:#4A9EFF}
.card.hi{border-left-color:#00D4FF}
.cl{font-size:7px;letter-spacing:2.5px;color:rgba(140,190,255,.38);
  margin-bottom:5px;text-transform:uppercase}
.cv{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;
  color:#5EEAD4;line-height:1}
.cv.sm{font-size:12px;color:rgba(140,190,255,.55)}

/* RIGHT */
#rpanel{position:absolute;right:20px;top:64px;bottom:64px;width:162px;
  display:flex;flex-direction:column;gap:5px;justify-content:center}
.rcrd{background:rgba(6,14,30,0.82);border:1px solid rgba(74,158,255,.14);
  border-right:2px solid rgba(74,158,255,.28);padding:10px 13px;
  backdrop-filter:blur(18px)}

/* Signal bars */
#sbars{display:flex;align-items:flex-end;gap:2.5px;margin-top:6px;height:20px}
.sb{width:8px;border-radius:1px 1px 0 0;background:rgba(74,158,255,.09);
  transition:background .12s,box-shadow .12s}

/* Palette dots */
#pdots{display:flex;gap:5px;margin-top:7px}
.pd{width:13px;height:13px;border-radius:2px;opacity:.5;transition:all .18s}
.pd.on{opacity:1;transform:scale(1.2);box-shadow:0 0 8px currentColor}

/* Gesture */
#gcard{transition:border-color .3s}
#gcard.on{border-right-color:rgba(94,234,212,.45)}
#gtxt{font-size:7.5px;letter-spacing:2px;margin-top:5px;
  color:rgba(140,190,255,.38);transition:color .3s}
#gcard.on #gtxt{color:#5EEAD4}

/* FPS */
#fps{position:absolute;bottom:60px;right:22px;font-size:9px;
  letter-spacing:1.5px;color:rgba(140,190,255,.3)}

/* BOTTOM */
#botbar{position:absolute;bottom:0;left:0;right:0;height:52px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding:0 28px;border-top:1px solid rgba(74,158,255,.14);pointer-events:all;
  background:linear-gradient(0deg,rgba(3,8,16,.96) 0%,rgba(3,8,16,0) 100%)}
.btn{font-family:'DM Mono',monospace;font-size:8px;font-weight:500;
  letter-spacing:2px;color:rgba(140,190,255,.62);background:transparent;
  border:1px solid rgba(74,158,255,.2);padding:7px 15px;cursor:pointer;
  transition:all .16s;user-select:none;border-radius:2px;white-space:nowrap}
.btn:hover{color:#E8F4FF;border-color:rgba(74,158,255,.5);
  background:rgba(74,158,255,.07);box-shadow:0 0 12px rgba(74,158,255,.1)}
.btn:active{transform:scale(.95)}
.btn.on{color:#00D4FF;border-color:rgba(0,212,255,.4);
  background:rgba(0,212,255,.08);box-shadow:0 0 14px rgba(0,212,255,.12)}

#hints{position:absolute;bottom:53px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;pointer-events:none;flex-wrap:wrap;justify-content:center}
.kh{font-size:7px;letter-spacing:1px;color:rgba(140,190,255,.28);
  padding:2px 6px;border:1px solid rgba(74,158,255,.08);border-radius:1px}
.kh b{color:rgba(140,190,255,.55);font-weight:500}

@media(max-width:700px){#lpanel,#rpanel{display:none}#hints{display:none}
  #topbar{padding:0 14px}.btn{padding:5px 8px}}
</style>
</head>
<body>
<video id="cam" autoplay playsinline></video>
<canvas id="gl"></canvas>
<div id="vig"></div>
<div id="flash"></div>

<div id="hud">
  <div id="topbar">
    <div class="brand">NEURAL <em>MATRIX</em></div>
    <div id="sysrow">
      <div class="ldot"></div>
      <span>LIVE</span>
      <span id="clk">--:--:--</span>
    </div>
  </div>

  <div id="lpanel">
    <div class="card hi"><div class="cl">Neural Nodes</div><div class="cv" id="v-nodes">—</div></div>
    <div class="card"><div class="cl">Synapses</div><div class="cv" id="v-syn">—</div></div>
    <div class="card"><div class="cl">Pulses Fired</div><div class="cv" id="v-pulse">000</div></div>
    <div class="card"><div class="cl">Network Scale</div><div class="cv sm" id="v-scale">1.00×</div></div>
    <div class="card"><div class="cl">Camera Dist</div><div class="cv sm" id="v-dist">28.0</div></div>
  </div>

  <div id="rpanel">
    <div class="rcrd card"><div class="cl">Signal Intensity</div><div id="sbars"></div></div>
    <div class="rcrd card"><div class="cl">Color Palette</div><div id="pdots"></div></div>
    <div class="rcrd card" id="gcard"><div class="cl">Hand Tracking</div><div id="gtxt">OFFLINE</div></div>
    <div class="rcrd card"><div class="cl">Rotation X / Y</div><div class="cv sm" id="v-rot">0.00 / 0.00</div></div>
  </div>

  <div id="fps">— FPS</div>

  <div id="hints">
    <span class="kh"><b>SPACE</b> pause</span>

    <span class="kh"><b>R</b> regenerate</span>
    <span class="kh"><b>CLICK</b> pulse</span>
  </div>
  <div id="botbar">
    <button class="btn" id="b-pause">⏸ PAUSE</button>
    <button class="btn on" id="b-auto">⟳ AUTO ROTATE</button>
    <button class="btn" id="b-pal">◈ STELLAR</button>
    <button class="btn" id="b-regen">⟲ REGENERATE</button>
    <button class="btn" id="b-reset">⊹ RESET VIEW</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════════════
// PALETTES
// ═══════════════════════════════════════════════════════════════════════
const PALS = [
  { name:'STELLAR', b:{s:1.42,r:.36,t:.74}, h:[0x4A9EFF,0x00D4FF,0x5EEAD4,0x818CF8,0x38BDF8] },
  { name:'AURORA',  b:{s:1.58,r:.40,t:.69}, h:[0x6EE7B7,0x34D399,0x10FFAA,0x00FFD4,0x5EEAD4] },
  { name:'NEBULA',  b:{s:1.68,r:.43,t:.66}, h:[0xA78BFA,0x818CF8,0x6366F1,0xC4B5FD,0xDDD6FE] },
  { name:'SOLAR',   b:{s:1.48,r:.38,t:.71}, h:[0xFBBF24,0xF59E0B,0xFCD34D,0xFFE082,0xFDE68A] },
  { name:'CRIMSON', b:{s:1.62,r:.42,t:.67}, h:[0xF87171,0xFCA5A5,0xFB923C,0xFFAFAF,0xFED7AA] },
];
let pi = 0;
let PAL = PALS[0].h.map(c=>new THREE.Color(c));

// ═══════════════════════════════════════════════════════════════════════
// SIMPLEX NOISE (minimal)
// ═══════════════════════════════════════════════════════════════════════
const SN = `
float snoise(vec3 v){
  const vec2 C=vec2(.166667,.333333);
  vec3 i=floor(v+dot(v,C.yyy)),x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz),l=1.-g,i1=min(g,l.zxy),i2=max(g,l.zxy);
  vec3 x1=x0-i1+C.xxx,x2=x0-i2+2.*C.xxx,x3=x0-1.+3.*C.xxx;
  i=mod(i,289.);
  vec4 p=mod((mod((mod(i.z+vec4(0.,i1.z,i2.z,1.),289.)*34.+10.)*mod(i.z+vec4(0.,i1.z,i2.z,1.),289.),289.)+
    mod((mod((mod(i.y+vec4(0.,i1.y,i2.y,1.),289.)*34.+10.)*mod(i.y+vec4(0.,i1.y,i2.y,1.),289.),289.))*1.,289.))*1.+
    mod((mod((mod(i.x+vec4(0.,i1.x,i2.x,1.),289.)*34.+10.)*mod(i.x+vec4(0.,i1.x,i2.x,1.),289.),289.))*1.,289.),289.);
  vec3 ns=.142857*vec3(2.,1.,0.)-vec3(1.,0.,0.);
  vec4 j=p-49.*floor(p*.020408),x_=floor(j*.142857),y_=floor(j-7.*x_),
       x=x_*.285714+.142857,y=y_*.285714+.142857,h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy),b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.,s1=floor(b1)*2.+1.,sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy,a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x),p1=vec3(a0.zw,h.y),p2=vec3(a1.xy,h.z),p3=vec3(a1.zw,h.w);
  vec4 norm=1.79284291-.85373472*vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.5-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
  m*=m;return 105.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

const MP = 5; // max simultaneous pulses

// ═══════════════════════════════════════════════════════════════════════
// SHARED UNIFORMS
// ═══════════════════════════════════════════════════════════════════════
const U = {
  uT:      { value: 0 },
  uPPos:   { value: Array.from({length:MP},()=>new THREE.Vector3(1e6,1e6,1e6)) },
  uPTime:  { value: new Array(MP).fill(-1e6) },
  uPCol:   { value: Array.from({length:MP},()=>new THREE.Color(1,1,1)) },
  uPSpd:   { value: 16.5 },
};

// ═══════════════════════════════════════════════════════════════════════
// NODE SHADERS
// ═══════════════════════════════════════════════════════════════════════
const NV = `
attribute float aSize,aType,aDist,aPhase;
attribute vec3  aCol;
uniform float uT,uPSpd;
uniform vec3  uPPos[${MP}];
uniform float uPTime[${MP}];
varying vec3  vCol;
varying float vPulse,vBreath;
float getPulse(vec3 wp){
  float s=0.;
  for(int i=0;i<${MP};i++){
    float dt=uT-uPTime[i];
    if(dt<0.||dt>4.2)continue;
    s+=smoothstep(3.2,0.,abs(distance(wp,uPPos[i])-dt*uPSpd))*smoothstep(4.2,0.,dt);
  }
  return min(s,1.);
}
void main(){
  vCol=aCol;
  vec3 wp=(modelMatrix*vec4(position,1.)).xyz;
  vPulse=getPulse(wp);
  vBreath=.78+.22*sin(uT*.95+aPhase);
  float sz=aSize*vBreath*(1.+vPulse*2.);
  vec4 mv=modelViewMatrix*vec4(position,1.);
  gl_PointSize=sz*(660./-mv.z);
  gl_Position=projectionMatrix*mv;
}`;

const NF = `
uniform float uT;
uniform vec3  uPCol[${MP}];
varying vec3  vCol;
varying float vPulse,vBreath;
void main(){
  vec2 uv=gl_PointCoord*2.-1.;
  float d=length(uv);
  if(d>1.)discard;
  float core  =pow(1.-smoothstep(0.,.25,d),2.2);
  float corona=pow(max(0.,1.-d),1.8)*.38;
  vec3 c=vCol*(vBreath*.88+.12);
  if(vPulse>.0)c=mix(c,uPCol[0]*1.7+.12,vPulse*.68);
  gl_FragColor=vec4(c,clamp(core+corona,0.,1.));
}`;

// ═══════════════════════════════════════════════════════════════════════
// CONNECTION SHADERS  (baked bezier — position IS vec3)
// ═══════════════════════════════════════════════════════════════════════
const CV = `
attribute float aT,aStr,aIdx,aPhase;
attribute vec3  aCol,aStart,aEnd;
uniform float uT,uPSpd;
uniform vec3  uPPos[${MP}];
uniform float uPTime[${MP}];
varying vec3  vCol;
varying float vStr,vPulse,vFlow;
float getPulse(vec3 wp){
  float s=0.;
  for(int i=0;i<${MP};i++){
    float dt=uT-uPTime[i];
    if(dt<0.||dt>4.2)continue;
    s+=smoothstep(3.5,0.,abs(distance(wp,uPPos[i])-dt*uPSpd))*smoothstep(4.2,0.,dt);
  }
  return min(s,1.);
}
void main(){
  vCol=aCol;vStr=aStr;
  float spd=1.3+aStr*1.1;
  float fp=fract(aT*4.8-uT*spd*.1+aPhase);
  vFlow=smoothstep(0.,.18,fp)*smoothstep(.32,.18,fp)*aStr;
  vPulse=getPulse((modelMatrix*vec4(position,1.)).xyz);
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
}`;

const CF = `
uniform float uT;
uniform vec3  uPCol[${MP}];
varying vec3  vCol;
varying float vStr,vPulse,vFlow;
void main(){
  vec3 c=vCol*(.46+vFlow*1.6);
  if(vPulse>.0)c=mix(c,uPCol[0]*2.+.08,vPulse*.72);
  float a=.14+.52*vStr+vFlow*.42;
  a=mix(a,min(1.,a*1.7),vPulse);
  gl_FragColor=vec4(c,clamp(a,0.,1.));
}`;

// ═══════════════════════════════════════════════════════════════════════
// RENDERER + SCENE
// ═══════════════════════════════════════════════════════════════════════
const canvas=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x030810);
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x030810,.0006); // very gentle fog

const cam=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,.1,800);
cam.position.set(0,4,28);

const ctrl=new OrbitControls(cam,renderer.domElement);
ctrl.enableDamping=true;ctrl.dampingFactor=.045;
ctrl.rotateSpeed=.5;ctrl.minDistance=4;ctrl.maxDistance=100;
ctrl.autoRotate=true;ctrl.autoRotateSpeed=.2;ctrl.enablePan=false;

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,cam));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.42,.36,.74);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ═══════════════════════════════════════════════════════════════════════
// STARFIELD  — three layers, pure Points (no opaque sphere)
// ═══════════════════════════════════════════════════════════════════════
function mkStars(n,rMin,rMax,ptSize,flickerSpd){
  const pos=new Float32Array(n*3),ph=new Float32Array(n);
  for(let i=0;i<n;i++){
    const r=THREE.MathUtils.randFloat(rMin,rMax);
    const phi=Math.acos(THREE.MathUtils.randFloatSpread(2));
    const th=Math.random()*Math.PI*2;
    pos[i*3]=r*Math.sin(phi)*Math.cos(th);
    pos[i*3+1]=r*Math.sin(phi)*Math.sin(th);
    pos[i*3+2]=r*Math.cos(phi);
    ph[i]=Math.random()*Math.PI*2;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('aPhase',  new THREE.Float32BufferAttribute(ph,1));
  const m=new THREE.ShaderMaterial({
    uniforms:{uT:{value:0},uSpd:{value:flickerSpd}},
    vertexShader:`attribute float aPhase;uniform float uT,uSpd;varying float vA;
    void main(){vA=.3+.7*sin(uT*uSpd+aPhase);
    vec4 mv=modelViewMatrix*vec4(position,1.);
    gl_PointSize=${ptSize.toFixed(2)}*(180./-mv.z);
    gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`varying float vA;
    void main(){float d=length(gl_PointCoord-.5)*2.;if(d>1.)discard;
    gl_FragColor=vec4(.78,.90,1.,(1.-d)*vA*.9);}`,
    transparent:true,blending:THREE.AdditiveBlending,depthWrite:false
  });
  return {obj:new THREE.Points(g,m),mat:m};
}
const stars=[
  mkStars(4200,90,320,.075,.20),
  mkStars(650, 55,160,.26, .45),
  mkStars(100, 35,90, .70, 1.2),
];
stars.forEach(s=>scene.add(s.obj));

// ═══════════════════════════════════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════════════════════════════════
const netGrp=new THREE.Group();
scene.add(netGrp);
let nMesh=null,cMesh=null;

class N{
  constructor(p,lvl=0,type=0){
    this.p=p;this.lvl=lvl;this.type=type;
    this.size=type===0?THREE.MathUtils.randFloat(.38,.95):THREE.MathUtils.randFloat(.2,.52);
    this.dist=0;this.edges=new Map();
  }
  link(o,s=1){if(!this.edges.has(o)){this.edges.set(o,s);o.edges.set(this,s);}}
}

function build(){
  [nMesh,cMesh].forEach(m=>{if(m){m.geometry.dispose();m.material.dispose();netGrp.remove(m);}});
  nMesh=cMesh=null;

  const ns=[],root=new N(new THREE.Vector3(),0,2);
  root.size=1.8;ns.push(root);

  // Axis spines (Fibonacci-distributed directions)
  const NAXES=7,APX=10,ALEN=22,ends=[];
  for(let a=0;a<NAXES;a++){
    const phi=Math.acos(1-2*(a+.5)/NAXES);
    const th=Math.PI*(1+Math.sqrt(5))*a;
    const dir=new THREE.Vector3(Math.sin(phi)*Math.cos(th),Math.sin(phi)*Math.sin(th),Math.cos(phi));
    let prev=root;
    for(let i=1;i<=APX;i++){
      const t=i/APX,d=ALEN*Math.pow(t,.74);
      const jit=new THREE.Vector3(Math.sin(t*9+a)*.65,Math.cos(t*7+a*.9)*.65,Math.sin(t*6+a*1.3)*.65);
      const n=new N(dir.clone().multiplyScalar(d).add(jit),i,i===APX?1:0);
      n.dist=d;ns.push(n);prev.link(n,1-t*.26);prev=n;
      if(i===APX)ends.push(n);
    }
  }

  // Orbital shells
  const shells=[],RADS=[4.5,8,12.5,17,21];
  for(const rd of RADS){
    const cnt=Math.round(rd*3.6),sh=[];
    for(let i=0;i<cnt;i++){
      const phi=Math.acos(2*Math.random()-1),th=(i/cnt)*Math.PI*2+Math.random()*.2;
      const r=rd*THREE.MathUtils.randFloat(.9,1.1);
      const n=new N(new THREE.Vector3(r*Math.sin(phi)*Math.cos(th),r*Math.sin(phi)*Math.sin(th),r*Math.cos(phi)),
        Math.ceil(rd/5),Math.random()<.28?1:0);
      n.dist=rd;ns.push(n);sh.push(n);
    }
    shells.push(sh);
    for(let i=0;i<sh.length;i++){
      sh[i].link(sh[(i+1)%sh.length],.56);
      if(i%5===0&&sh.length>8)sh[i].link(sh[(i+Math.floor(sh.length/3))%sh.length],.26);
    }
  }

  // Shell → nearest axis node
  for(const sh of shells)for(const sn of sh){
    let best=null,bd=1e9;
    for(const n of ns){if(n===root||n===sn)continue;const d=sn.p.distanceTo(n.p);if(d<bd){bd=d;best=n;}}
    if(best&&bd<9.5)sn.link(best,.33+(1-bd/9.5)*.44);
  }

  // Inter-shell
  for(let r=0;r<shells.length-1;r++){
    const cnt=Math.floor(shells[r].length*.36);
    for(let i=0;i<cnt;i++){
      const a=shells[r][Math.floor(Math.random()*shells[r].length)];
      const b=shells[r+1][Math.floor(Math.random()*shells[r+1].length)];
      a.link(b,.42);
    }
  }

  // Endpoint bridges
  for(let i=0;i<ends.length;i++){
    const j=(i+2)%ends.length,a=ends[i],b=ends[j];let prev=a;
    for(let s=1;s<=3;s++){
      const t=s/4,p=new THREE.Vector3().lerpVectors(a.p,b.p,t);
      p.add(new THREE.Vector3(THREE.MathUtils.randFloatSpread(3),THREE.MathUtils.randFloatSpread(3),THREE.MathUtils.randFloatSpread(3)));
      const n=new N(p,a.lvl,0);n.dist=root.p.distanceTo(p);ns.push(n);prev.link(n,.36);prev=n;
    }
    prev.link(b,.36);
  }

  // ── Node buffers ───────────────────────────────────────────────────
  const np=[],nSz=[],nTp=[],nC=[],nDi=[],nPh=[];
  ns.forEach(n=>{
    np.push(n.p.x,n.p.y,n.p.z);
    nSz.push(n.size);nTp.push(n.type);
    const c=PAL[n.lvl%PAL.length];
    nC.push(c.r,c.g,c.b);
    nDi.push(n.dist);nPh.push(Math.random()*Math.PI*2);
  });
  const ng=new THREE.BufferGeometry();
  ng.setAttribute('position',new THREE.Float32BufferAttribute(np,3));
  ng.setAttribute('aSize',   new THREE.Float32BufferAttribute(nSz,1));
  ng.setAttribute('aType',   new THREE.Float32BufferAttribute(nTp,1));
  ng.setAttribute('aCol',    new THREE.Float32BufferAttribute(nC,3));
  ng.setAttribute('aDist',   new THREE.Float32BufferAttribute(nDi,1));
  ng.setAttribute('aPhase',  new THREE.Float32BufferAttribute(nPh,1));
  nMesh=new THREE.Points(ng,new THREE.ShaderMaterial({uniforms:U,vertexShader:NV,fragmentShader:NF,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
  netGrp.add(nMesh);

  // ── Connection buffers (BAKED BEZIER — proper vec3 positions) ──────
  const SEG=60;
  const cv=[],cT=[],cStr=[],cIdx=[],cCol=[],cPh=[],cSt=[],cEn=[];
  const seen=new Set();
  const ni=new Map(ns.map((n,i)=>[n,i]));
  let totalConns=0;

  ns.forEach((n,i)=>{
    n.edges.forEach((str,o)=>{
      const oi=ni.get(o);if(oi===undefined||oi<=i)return;
      const key=`${i}-${oi}`;if(seen.has(key))return;seen.add(key);
      // Unique bezier arc
      const delta=o.p.clone().sub(n.p),len=delta.length();
      const dir=delta.clone().divideScalar(Math.max(len,.001));
      const up=Math.abs(dir.y)<.85?new THREE.Vector3(0,1,0):new THREE.Vector3(1,0,0);
      const perp=new THREE.Vector3().crossVectors(dir,up).normalize();
      const perp2=new THREE.Vector3().crossVectors(dir,perp).normalize();
      const ca=Math.cos(i*.97+.3),sa=Math.sin(i*.63+1.1);
      const arch=len*(Math.abs(ca)*.055+.018);
      const mid=n.p.clone().add(o.p).multiplyScalar(.5)
        .addScaledVector(perp,ca*arch).addScaledVector(perp2,sa*arch);
      const c=PAL[n.lvl%PAL.length];
      const ph=Math.random()*Math.PI*2;
      for(let s=0;s<=SEG;s++){
        const t=s/SEG,inv=1-t;
        // Baked quadratic bezier position
        const bx=inv*inv*n.p.x+2*inv*t*mid.x+t*t*o.p.x;
        const by=inv*inv*n.p.y+2*inv*t*mid.y+t*t*o.p.y;
        const bz=inv*inv*n.p.z+2*inv*t*mid.z+t*t*o.p.z;
        cv.push(bx,by,bz);
        cT.push(t);cStr.push(str);cIdx.push(i);
        cCol.push(c.r,c.g,c.b);cPh.push(ph);
        cSt.push(n.p.x,n.p.y,n.p.z);cEn.push(o.p.x,o.p.y,o.p.z);
      }
      totalConns++;
    });
  });

  const cg=new THREE.BufferGeometry();
  cg.setAttribute('position',new THREE.Float32BufferAttribute(cv,3));  // ← REAL vec3 positions
  cg.setAttribute('aT',      new THREE.Float32BufferAttribute(cT,1));
  cg.setAttribute('aStr',    new THREE.Float32BufferAttribute(cStr,1));
  cg.setAttribute('aIdx',    new THREE.Float32BufferAttribute(cIdx,1));
  cg.setAttribute('aCol',    new THREE.Float32BufferAttribute(cCol,3));
  cg.setAttribute('aPhase',  new THREE.Float32BufferAttribute(cPh,1));
  cg.setAttribute('aStart',  new THREE.Float32BufferAttribute(cSt,3));
  cg.setAttribute('aEnd',    new THREE.Float32BufferAttribute(cEn,3));
  cMesh=new THREE.LineSegments(cg,new THREE.ShaderMaterial({uniforms:U,vertexShader:CV,fragmentShader:CF,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
  netGrp.add(cMesh);

  document.getElementById('v-nodes').textContent=ns.length.toString().padStart(3,'0');
  document.getElementById('v-syn').textContent=totalConns.toString().padStart(3,'0');
  refreshPalUI();
}

// ═══════════════════════════════════════════════════════════════════════
// PULSE
// ═══════════════════════════════════════════════════════════════════════
let pIdx=0,pCount=0,signal=0;
function firePulse(pos,col){
  U.uPPos.value[pIdx].copy(pos);
  U.uPTime.value[pIdx]=performance.now()/1000;
  U.uPCol.value[pIdx].copy(col);
  pIdx=(pIdx+1)%MP;
  pCount++;signal=Math.min(1,signal+.44);
  document.getElementById('v-pulse').textContent=pCount.toString().padStart(3,'0');
  const f=document.getElementById('flash');f.style.opacity='.85';setTimeout(()=>f.style.opacity='0',120);
}

// ═══════════════════════════════════════════════════════════════════════
// SIGNAL METER
// ═══════════════════════════════════════════════════════════════════════
const sbc=document.getElementById('sbars');
const BN=12;
for(let i=0;i<BN;i++){const b=document.createElement('div');b.className='sb';b.style.height=(3+i*1.25)+'px';sbc.appendChild(b);}
function drawMeter(v){
  sbc.querySelectorAll('.sb').forEach((b,i)=>{
    const t=i/BN;
    if(v>t){const c=`hsl(${195-t*75},88%,62%)`;b.style.background=c;b.style.boxShadow=`0 0 5px ${c}`;}
    else{b.style.background='rgba(74,158,255,.08)';b.style.boxShadow='none';}
  });
}

// ═══════════════════════════════════════════════════════════════════════
// PALETTE UI
// ═══════════════════════════════════════════════════════════════════════
function refreshPalUI(){
  const dc=document.getElementById('pdots');dc.innerHTML='';
  PALS.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='pd'+(i===pi?' on':'');
    d.style.background='#'+p.h[0].toString(16).padStart(6,'0');
    dc.appendChild(d);
  });
  document.getElementById('b-pal').textContent=`◈ ${PALS[pi].name}`;
}

// ═══════════════════════════════════════════════════════════════════════
// RAYCASTER / CLICK
// ═══════════════════════════════════════════════════════════════════════
const ray=new THREE.Raycaster(),mp=new THREE.Vector2();
const ipl=new THREE.Plane(),ipt=new THREE.Vector3();
function pulseAt(cx,cy){
  mp.x=(cx/innerWidth)*2-1;mp.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(mp,cam);
  ipl.normal.copy(cam.position).normalize();
  ipl.constant=-ipl.normal.dot(cam.position)*.42;
  if(ray.ray.intersectPlane(ipl,ipt))
    firePulse(ipt.clone(),PAL[Math.floor(Math.random()*PAL.length)]);
}
canvas.addEventListener('click',e=>{if(!ST.paused)pulseAt(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',e=>{
  if(!ST.paused&&e.touches.length===1){e.preventDefault();pulseAt(e.touches[0].clientX,e.touches[0].clientY);}
},{passive:false});

// ═══════════════════════════════════════════════════════════════════════
// HAND TRACKING
// ═══════════════════════════════════════════════════════════════════════
const vid=document.getElementById('cam');
let lH=null,rH=null;
const hst={r:{last:null},two:{on:false,d0:0,s0:1}};
function d2h(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function cen(lms){let x=0,y=0;for(const l of lms){x+=l.x;y+=l.y;}return{x:x/lms.length,y:y/lms.length};}
function isOpen(h){return[h[8],h[12],h[16],h[20]].filter((t,i)=>d2h(t,[h[5],h[9],h[13],h[17]][i])>.11).length>=3;}
let lastOpen=false,lastOpenT=0;
function handleHands(l,r){
  const now=performance.now()/1000;
  const open=(l&&isOpen(l))||(r&&isOpen(r));
  if(!open&&lastOpen&&now-lastOpenT>.05&&now-lastOpenT<.6){
    const h=l||r;
    if(h)firePulse(new THREE.Vector3((h[0].x-.5)*42,-(h[0].y-.5)*42,h[0].z*18),PAL[Math.floor(Math.random()*PAL.length)]);
  }
  if(open&&!lastOpen)lastOpenT=now;
  lastOpen=open;
  if(l&&r){
    ctrl.enabled=false;
    const d=d2h(l[0],r[0]);
    if(!hst.two.on){hst.two.on=true;hst.two.d0=d;hst.two.s0=netGrp.scale.x;}
    else{
      const ns=THREE.MathUtils.clamp(THREE.MathUtils.lerp(netGrp.scale.x,hst.two.s0*(d/hst.two.d0),.1),.2,5);
      netGrp.scale.setScalar(ns);document.getElementById('v-scale').textContent=ns.toFixed(2)+'×';
    }
    hst.r.last=null;
  } else if(r&&!l){
    ctrl.enabled=false;
    const c=cen(r);
    if(hst.r.last){netGrp.rotation.y-=(c.x-hst.r.last.x)*innerWidth*.0016;netGrp.rotation.x+=(c.y-hst.r.last.y)*innerHeight*.0016;}
    hst.r.last=c;hst.two.on=false;
  } else {ctrl.enabled=true;hst.r.last=null;hst.two.on=false;}
}
let handWas=false;
const det=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
det.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.7,minTrackingConfidence:.65});
det.onResults(res=>{
  lH=null;rH=null;
  if(res.multiHandLandmarks)res.multiHandedness.forEach((h,i)=>{
    if(h.label==='Right')lH=res.multiHandLandmarks[i];else rH=res.multiHandLandmarks[i];
  });
  const has=!!(lH||rH);
  if(has!==handWas){
    handWas=has;
    document.getElementById('gcard').className='rcrd card'+(has?' on':'');
    document.getElementById('gtxt').textContent=has?'TRACKING':'OFFLINE';
    vid.style.display=has?'block':'none';
  }
  if(has)handleHands(lH,rH);
});
const camUtil=new Camera(vid,{
  onFrame:async()=>{if(!ST.paused)await det.send({image:vid});},
  width:1280,height:720
});

// ═══════════════════════════════════════════════════════════════════════
// STATE + CONTROLS
// ═══════════════════════════════════════════════════════════════════════
const ST={paused:false,autoRot:true};

document.getElementById('b-pause').addEventListener('click',e=>{
  e.stopPropagation();ST.paused=!ST.paused;
  e.target.textContent=ST.paused?'▶ RESUME':'⏸ PAUSE';
  e.target.classList.toggle('on',ST.paused);
  ctrl.autoRotate=!ST.paused&&ST.autoRot;
});
document.getElementById('b-auto').addEventListener('click',e=>{
  e.stopPropagation();ST.autoRot=!ST.autoRot;
  ctrl.autoRotate=ST.autoRot&&!ST.paused;
  e.target.classList.toggle('on',ST.autoRot);
});
document.getElementById('b-pal').addEventListener('click',e=>{
  e.stopPropagation();pi=(pi+1)%PALS.length;PAL=PALS[pi].h.map(c=>new THREE.Color(c));
  const b=PALS[pi].b;bloom.strength=b.s;bloom.radius=b.r;bloom.threshold=b.t;
  build();firePulse(new THREE.Vector3(),PAL[0]);
});
document.getElementById('b-regen').addEventListener('click',e=>{
  e.stopPropagation();build();firePulse(new THREE.Vector3(),PAL[Math.floor(Math.random()*PAL.length)]);
});
document.getElementById('b-reset').addEventListener('click',e=>{
  e.stopPropagation();ctrl.reset();netGrp.rotation.set(0,0,0);netGrp.scale.setScalar(1);
  document.getElementById('v-scale').textContent='1.00×';ctrl.autoRotate=ST.autoRot;
});
window.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();document.getElementById('b-pause').click();}
  else if(e.key==='p'||e.key==='P')document.getElementById('b-pal').click();
  else if(e.key==='r'||e.key==='R')document.getElementById('b-regen').click();
});
window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);
  bloom.resolution.set(innerWidth,innerHeight);
});

// ═══════════════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════════════
const clk=new THREE.Clock();
let fpsF=0,fpsT=0;
setInterval(()=>{document.getElementById('clk').textContent=new Date().toTimeString().slice(0,8);},1000);

function animate(){
  requestAnimationFrame(animate);
  const t=clk.getElapsedTime();
  fpsF++;
  if(t-fpsT>.5){
    document.getElementById('fps').textContent=Math.round(fpsF/(t-fpsT))+' FPS';
    fpsT=t;fpsF=0;
  }
  if(!ST.paused){
    U.uT.value=t;
    signal*=.977;drawMeter(signal);
    stars.forEach((s,i)=>{s.mat.uniforms.uT.value=t;s.obj.rotation.y+=.00005*(i+1);s.obj.rotation.x+=.000025*(i+1);});
    const rx=((netGrp.rotation.x%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    const ry=((netGrp.rotation.y%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    document.getElementById('v-rot').textContent=`${rx.toFixed(2)} / ${ry.toFixed(2)}`;
    document.getElementById('v-dist').textContent=cam.position.length().toFixed(1);
  }
  ctrl.update();
  composer.render();
}

build();
camUtil.start();
animate();
</script>
</body>
