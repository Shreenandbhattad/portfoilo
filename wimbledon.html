<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wimbledon</title>
    
    <!-- Video.js Player Styles -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Fullscreen Player Container */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* Stream Selector Control Bar */
        #selector-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 9999;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: opacity 0.25s, transform 0.25s;
        }

        /* Auto-dim overlay when cursor is away */
        #selector-overlay:not(:hover) {
            opacity: 0.15;
            transform: scale(0.98);
        }

        #selector-overlay label {
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        select {
            width: 320px;
            padding: 8px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #0076ff;
        }

        #status-display {
            font-size: 12px;
            color: #00ff66;
            margin-top: 2px;
            word-break: break-all;
            max-width: 320px;
        }
        
        .error-text {
            color: #ff3b30 !important;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Floating Selector Panel -->
        <div id="selector-overlay">
            <label for="stream-menu">Select Stream to Test:</label>
            <select id="stream-menu" onchange="changeChannel()">
                <!-- Standard Live Channels -->
                <optgroup label="Standard Live Feeds">
                    <option value="http://a.files.bbci.co.uk/media/live/manifesto/audio_video/simulcast/hls/uk/abr_hdtv/ak/bbc_one_hd.m3u8">BBC One HD (HLS)</option>
                    <option value="https://vs-cmaf-push-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_one_london/pc_hd_abr_v2.fmp4.m3u8">BBC One London (Alternative 720p HLS)</option>
                    <option value="http://a.files.bbci.co.uk/media/live/manifesto/audio_video/simulcast/hls/uk/abr_hdtv/ak/bbc_two_england.m3u8">BBC Two HD (HLS)</option>
                    <option value="http://a.files.bbci.co.uk/media/live/manifesto/audio_video/simulcast/hls/uk/abr_hdtv/ak/bbc_four.m3u8">BBC Four HD (HLS)</option>
                    <option value="https://stvwest.akamaized.net/out/v1/0a8c175eec414b0d8bf7ac8178ad7aae/index.m3u8">ITV1 / STV1 (Alternative HLS)</option>
                </optgroup>
                
                <!-- Temporary Match UHD/HEVC Feeds -->
                <optgroup label="Temporary UHD Feeds (Only Active During Matches)">
                    <option value="https://ve-uhd-push-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:uk_bbc_stream_041/iptv_uhd_v1.mpd">BBC UHD Court Stream 41 (DASH)</option>
                    <option value="https://ve-uhd-push-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:uk_bbc_stream_042/iptv_uhd_v1.mpd">BBC UHD Court Stream 42 (DASH)</option>
                    <option value="https://ve-uhd-push-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:uk_bbc_stream_043/iptv_uhd_v1.mpd">BBC UHD Court Stream 43 (DASH)</option>
                    <option value="https://ve-uhd-push-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:uk_bbc_stream_044/iptv_uhd_v1.mpd">BBC UHD Court Stream 44 (DASH)</option>
                </optgroup>
            </select>
            <div id="status-display">Ready to initialize stream...</div>
        </div>

        <!-- HTML5 Video Component -->
        <video 
            id="live-player" 
            class="video-js vjs-default-skin" 
            controls 
            preload="auto" 
            autoplay 
            muted>
        </video>
    </div>

    <!-- Core Video Engine Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        // Initialize VideoJS Media Engine
        var player = videojs('live-player', {
            liveui: true,
            fluid: false,
            playbackRates: [1]
        });

        // Run default channel configuration on page bootup
        window.onload = function() {
            changeChannel();
        };

        function changeChannel() {
            var menu = document.getElementById('stream-menu');
            var selectedUrl = menu.value;
            var statusDiv = document.getElementById('status-display');
            
            statusDiv.classList.remove('error-text');
            statusDiv.innerText = "Loading target manifest...";

            // Determine appropriate MIME streaming profile
            var mimeType = 'application/x-mpegURL'; // HLS (.m3u8) default
            if (selectedUrl.includes('.mpd')) {
                mimeType = 'application/dash+xml'; // MPEG-DASH (.mpd)
            }

            // Mount and play new resource URL
            player.src({
                src: selectedUrl,
                type: mimeType
            });

            player.play()
                .then(function() {
                    statusDiv.innerText = "Playing stream successfully.";
                })
                .catch(function(error) {
                    statusDiv.classList.add('error-text');
                    statusDiv.innerText = "Active Block or Offline (404/403 Error). Check VPN routing.";
                    console.log("Playback error details:", error);
                });
        }
    </script>
</body>
</html>
