<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wimbledon</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .video-container { width: 100%; height: 100%; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="clean-player" class="video-js vjs-default-skin" controls preload="auto" autoplay></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const extractedUrl = "https://lb8.strmd.st/secure/jiAGdSbJWQnmLMVMHOMusStLbyIkhAeV/echo/stream/wimbledon-championships-2026-roland-2026/2/playlist.m3u8";

        const player = videojs('clean-player', { liveui: true, fluid: false });
        
        player.src({
            src: extractedUrl,
            type: 'application/x-mpegURL'
        });

        player.play().catch(function(error) {
            console.error("Playback failed. This usually means the browser blocked it due to CORS or missing Referer headers.", error);
        });
    </script>
</body>
</html>
