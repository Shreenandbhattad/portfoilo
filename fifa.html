<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Semi Finals</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#player{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    border:none;
}

#controls{
    position:fixed;
    top:15px;
    right:15px;
    z-index:9999;
}

select{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:rgba(0,0,0,.75);
    color:#fff;
    font-size:15px;
}
</style>
</head>

<body>

<div id="controls">
<select id="matchSelect">
    <option value="https://embed.st/embed/admin/ppv-france-vs-spain/1">
        France vs Spain
    </option>

    <option value="https://embed.st/embed/golf/23744/1">
        England vs Argentina
    </option>
</select>
</div>

<iframe
    id="player"
    src="https://embed.st/embed/admin/ppv-france-vs-spain/1"
    allowfullscreen
    allow="encrypted-media; picture-in-picture;"
    scrolling="no">
</iframe>

<script>
const player = document.getElementById("player");
const selector = document.getElementById("matchSelect");

// Manual switch
selector.onchange = function () {
    player.src = this.value;
};

// Automatic switch at 12:30 AM IST on July 16
const switchTime = new Date("2026-07-16T00:30:00+05:30");

function checkTime() {
    if (new Date() >= switchTime) {
        player.src = "https://embed.st/embed/golf/23744/1";
        selector.value = "https://embed.st/embed/golf/23744/1";
    }
}

checkTime();
setInterval(checkTime, 30000);
</script>

</body>
</html>
