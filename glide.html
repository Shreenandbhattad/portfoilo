<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paper pilot · Shreenand Bhattad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
<link rel="stylesheet" href="style.css">
<style>
main{max-width:900px;padding-bottom:30px}
#game{width:100%;height:min(62vh,540px);border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#e9f0f4 0%,#f7f5ee 100%);display:block;cursor:pointer;touch-action:none}
.hint{font-size:.8rem;color:var(--faint);margin-top:12px;text-align:center}
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<nav>
  <a class="home" href="index">Shreenand</a>
  <div class="pages">
    <a href="about">about</a>
    <a href="work">work</a>
    <a href="projects">projects</a>
    <a href="play" class="here">play</a>
    <a href="guestbook">guestbook</a>
    <a href="contact">say hi</a>
  </div>
</nav>

<main>
  <h1 class="page fade in">paper pilot</h1>
  <p class="sub fade in">hold to rise, let go to glide. don't crumple.</p>

  <canvas id="game"></canvas>
  <div class="hint">hold mouse / touch / spacebar to fly</div>

  <div class="next fade in"><a href="play">← back to play</a></div>
</main>

<script src="site.js"></script>
<script>
const cv = document.getElementById('game');
const cx = cv.getContext('2d');
let W, H;

function fit() {
  const DPR = Math.min(devicePixelRatio || 1, 2);
  const r = cv.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = W * DPR; cv.height = H * DPR;
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener('resize', fit);
fit();

let state = 'ready'; // ready | flying | over
let py, vy, dist, best = +(localStorage.getItem('sb-glide-best') || 0);
let gates = [], clouds = [], t = 0;
let holding = false;

function reset() {
  py = H / 2; vy = 0; dist = 0; t = 0;
  gates = []; clouds = [];
  for (let i = 0; i < 5; i++) clouds.push({ x: Math.random() * W, y: Math.random() * H * .8, s: .5 + Math.random() * .8, v: .2 + Math.random() * .3 });
}
reset();

cv.addEventListener('pointerdown', e => { e.preventDefault(); press(); });
cv.addEventListener('pointerup', () => holding = false);
cv.addEventListener('pointerleave', () => holding = false);
addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); press(); } });
addEventListener('keyup', e => { if (e.code === 'Space') holding = false; });

function press() {
  holding = true;
  if (state === 'ready') { state = 'flying'; }
  else if (state === 'over') { reset(); state = 'ready'; }
}

function spawnGate() {
  const gap = Math.max(120, 190 - dist / 40);
  const cy = 70 + Math.random() * (H - 140 - gap) + gap / 2;
  gates.push({ x: W + 60, cy, gap, passed: false });
}

function drawPlane(x, y, angle) {
  cx.save();
  cx.translate(x, y);
  cx.rotate(angle);
  cx.fillStyle = '#5b7ea3';
  cx.beginPath();
  cx.moveTo(14, 0); cx.lineTo(-10, 7); cx.lineTo(-5, 0); cx.lineTo(-10, -7);
  cx.closePath(); cx.fill();
  cx.fillStyle = '#a9bfd4';
  cx.beginPath();
  cx.moveTo(14, 0); cx.lineTo(-5, 0); cx.lineTo(-10, 7);
  cx.closePath(); cx.fill();
  cx.restore();
}

function puff(x, y, r, alpha) {
  cx.fillStyle = `rgba(255,255,255,${alpha})`;
  cx.beginPath();
  cx.arc(x, y, r, 0, 7);
  cx.arc(x + r * .8, y + r * .25, r * .7, 0, 7);
  cx.arc(x - r * .8, y + r * .25, r * .65, 0, 7);
  cx.fill();
}

function loop() {
  cx.clearRect(0, 0, W, H);

  // background puffs
  clouds.forEach(c => {
    c.x -= c.v;
    if (c.x < -80) { c.x = W + 80; c.y = Math.random() * H * .8; }
    puff(c.x, c.y, 22 * c.s, .5);
  });

  if (state === 'flying') {
    vy += holding ? -.28 : .22;
    vy = Math.max(-4.6, Math.min(4.6, vy));
    py += vy;
    dist += .12;
    t++;
    if (t % 110 === 0) spawnGate();

    gates.forEach(g => g.x -= 2.6);
    gates = gates.filter(g => g.x > -90);

    // collisions
    if (py < 8 || py > H - 8) state = 'over';
    for (const g of gates) {
      if (Math.abs(g.x - 70) < 26) {
        if (py < g.cy - g.gap / 2 + 6 || py > g.cy + g.gap / 2 - 6) state = 'over';
        else if (!g.passed) g.passed = true;
      }
    }
    if (state === 'over') {
      best = Math.max(best, Math.floor(dist));
      localStorage.setItem('sb-glide-best', best);
    }
  }

  // gates as cloud banks
  gates.forEach(g => {
    const topH = g.cy - g.gap / 2, botY = g.cy + g.gap / 2;
    for (let y = 14; y < topH - 10; y += 34) puff(g.x, y, 20, .95);
    puff(g.x, Math.max(topH - 12, 12), 22, .95);
    for (let y = botY + 12; y < H - 6; y += 34) puff(g.x, y, 20, .95);
  });

  drawPlane(70, py, Math.max(-.5, Math.min(.6, vy * .1)));

  // ui
  cx.fillStyle = '#8b857a';
  cx.font = '500 13px Inter';
  cx.textAlign = 'right';
  cx.fillText(Math.floor(dist) + ' m', W - 16, 26);
  if (best) cx.fillText('best ' + best + ' m', W - 16, 44);
  cx.textAlign = 'center';
  if (state === 'ready') {
    cx.fillStyle = '#3a362f';
    cx.font = '400 15px Inter';
    cx.fillText('hold to fly', W / 2, H / 2 - 40);
  }
  if (state === 'over') {
    cx.fillStyle = '#3a362f';
    cx.font = '500 17px Inter';
    cx.fillText('crumpled at ' + Math.floor(dist) + ' m', W / 2, H / 2 - 12);
    cx.font = '400 13px Inter';
    cx.fillStyle = '#8b857a';
    cx.fillText('tap to fold a new one', W / 2, H / 2 + 12);
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
